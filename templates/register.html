<!DOCTYPE html>

<html>
<head>
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

    .card {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 320px;
        text-align: center;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #34a853;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #2c8c46;
    }

    .link {
        margin-top: 15px;
        font-size: 14px;
    }

    .link a {
        color: #34a853;
        text-decoration: none;
    }

    .error {
        color: red;
        font-size: 13px;
    }
</style>

</head>

<body>

<div class="card">
    <h2>📝 Register</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Create Account</button>
</form>

<div class="link">
    Already have an account? <a href="/login">Login</a>
</div>

{% with messages = get_flashed_messages() %}
    {% for msg in messages %}
        <p class="error">{{ msg }}</p>
    {% endfor %}
{% endwith %}

</div>

</body>
</html>

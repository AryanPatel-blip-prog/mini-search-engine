<!DOCTYPE html>

<html>
<head>
    <title>Search History</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: #f5f7fa;
        margin: 0;
    }

    .topbar {
        background: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .container {
        width: 60%;
        margin: 40px auto;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 15px;
        transition: 0.2s;
    }

    .card:hover {
        transform: scale(1.02);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    a {
        text-decoration: none;
        color: #1a73e8;
    }

    .time {
        font-size: 12px;
        color: gray;
    }
</style>

</head>

<body>

<div class="topbar">
    <div>📜 History</div>
    <div>
        {{ user }} |
        <a href="/">Home</a> |
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

{% if history %}
    {% for q, time in history %}
        <div class="card">
            <a href="/search?query={{ q }}">🔎 {{ q }}</a>
            <div class="time">{{ time }}</div>
        </div>
    {% endfor %}
{% else %}
    <p>No search history found.</p>
{% endif %}

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Mini Search Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url("{{ url_for('static', filename='bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }

        /* Overlay (important for readability) */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-size: 50px;
            color: #333;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            justify-content: center;
        }

        input {
            width: 450px;
            padding: 15px;
            border-radius: 30px 0 0 30px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 0 30px 30px 0;
            background: #4285f4;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #357ae8;
        }

        .footer {
            margin-top: 20px;
            color: #777;
            font-size: 14px;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<p style="position:absolute; top:20px; right:30px; font-size:14px;">
    {% if user %}
        Welcome, {{ user }} |
        <a href="/history">History</a> |
        <a href="/logout">Logout</a>
    {% else %}
        <a href="/login">Login</a> | <a href="/register">Register</a>
    {% endif %}
</p>

<div class="container">

    <div id="recent-search">
        {% if user and history %}
            <h3>Recent Search</h3>
            <p>
                <a href="/search?query={{ history }}" style="color:#4285f4;">
                    🔎 {{ history }}
                </a>
            </p>
        {% endif %}
    </div>

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    <h1>🔍 Mini Search</h1>

    <form action="/search">
        <div class="search-box">
            <input type="text" name="query" placeholder="Search the web..." required>
            <button type="submit">Search</button>
        </div>
    </form>

    <div class="footer">
        Powered by your own search engine 🚀
    </div>
</div>

<script>
async function updateRecentSearch() {
    try {
        const res = await fetch('/latest-search');
        const data = await res.json();

        if (data.query) {
            document.getElementById("recent-search").innerHTML = `
                <h3>Recent Search</h3>
                <p>
                    <a href="/search?query=${data.query}" style="color:#4285f4;">
                        🔎 ${data.query}
                    </a>
                </p>
            `;
        }
    } catch (e) {
        console.log("Error updating search");
    }
}

// 🔁 Update every 2 seconds
setInterval(updateRecentSearch, 2000);
</script>

</body>
</html>
